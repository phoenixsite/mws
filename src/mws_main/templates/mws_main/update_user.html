{% extends 'mws_main/store_base.html' %}

{% block title %}Update profile | {{ tenant.name }}{% endblock %}

{% block content %}

<section class="profile-section profile-header">
  <h1>{{ object.get_full_name }}</h1>
</section>

<section class="profile-section profile-details">

  <section class="profile-subsection profile-basic">
    <nav>
      <h2>Basic information</h2>
    </nav>

    <form method="post" action="{% url 'mws_main:update_profile' tenant.store_url %}">
      {% csrf_token %}
      {{ form.as_ul }}
      <input class="main-button" type="submit" value="Save">
    </form>
  </section>
</section>

{% endblock %}
