{% extends 'mws_main/repo-base.html' %}

{% block title %}Add developer | {{ tenant.name }}{% endblock %}

{% block content %}
<h1>Add a developer</h1>

<form method="post" action="{% url 'mws_main:add_developer' tenant.repo_addr %}">
  {% csrf_token %}
  {{ form.as_ul }}
  <input type="submit" value="Save">
</form>
{% endblock %}
