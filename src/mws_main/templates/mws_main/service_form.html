{% extends 'mws_main/repo-base.html' %}

{% block title %}Add service | {{ tenant.name }}{% endblock %}

{% block content %}
<section class="form-section">

  <h1>Add a service</h1>
  
  <form class="registration-form" method="post" action="{% url 'mws_main:add_service' tenant.repo_addr %}" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_ul }}
    <input type="submit" value="Save">
  </form>
</section>
{% endblock %}
