{% load static %}

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8"/>
    <link rel="stylesheet" href="{% static 'mws_main/style.css' %}" type="text/css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/fontawesome.min.css" integrity="sha512-siarrzI1u3pCqFG2LEzi87McrBmq6Tp7juVsdmGY1Dr8Saw+ZBAzDzrGwX3vgxX1NkioYNCFOVC0GpDPss10zQ==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>{% block title %}{% endblock %}</title>
  </head>

  <body>
    <header class="site-header">
      <a class="site-title" href="{% url 'mws_main:store_home' tenant.store_url %}">{{ tenant.name }}</a>

      <section class="actions-section">

	<a class="action" href="{% url 'mws_main:view_profile' tenant.store_url %}">View profile</a>
	
	<form class="action-form" method="post" action="{% url 'mws_main:logout' tenant.store_url %}">
	  {% csrf_token %}
	  <input class="action" type="submit" value="Log out">
	</form>
	
	{% block actions %}{% endblock %}
	
      </section>
    </header>

    <main>
      {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
      <p>{{ tenant.name }}</p>
    </footer>

  </body>
</html>
