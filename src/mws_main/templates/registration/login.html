{% extends "registration/base.html" %}

{% block actions %}
<a href="{% url 'mws_main:signup' tenant.repo_addr %}">Sign up</a>
{% endblock %}

{% block content %}
<form method="post" action="{% url 'mws_main:login' tenant.repo_addr %}">
  {% csrf_token %}
  {{ form }}
  <input type="submit" value="Login">
  {% if error_message %}<p><strong>{{ error_message }}</strong></p>{% endif %}
</form>
{% endblock %}
